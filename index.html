<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .chat-container {
            width: 400px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Rasm uchun yangi dizayn */
        .profile-pic {
            display: block;
            margin: 0 auto 10px auto;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #007bff;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: #333;
        }

        #chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: #fafafa;
        }

        .message {
            margin: 8px 0;
            padding: 8px 10px;
            border-radius: 8px;
            max-width: 85%;
            word-wrap: break-word;
        }

        .user {
            background: #d1e7ff;
            text-align: right;
            margin-left: auto;
        }

        .bot {
            background: #e8e8e8;
            text-align: left;
            margin-right: auto;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 10px 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #typing {
            font-style: italic;
            color: #666;
            margin: 8px 0;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <img src="/static/images/profile.png" alt="Zafar" class="profile-pic">
        
        <h2>Creator Zafar</h2>
        <div id="chat-box"></div>

        <div class="input-row">
            <input type="text" id="message-input" placeholder="Xabar yozing..." />
            <button onclick="sendMessage()">Yuborish</button>
        </div>
    </div>
